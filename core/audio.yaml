external_components:
  - source:
      type: git
      url: https://github.com/n-IA-hane/esphome-intercom
      ref: audio-core-v2
    components: [i2s_audio_duplex, esp_afe, audio_processor]

i2c:
  id: i2c_bus
  scl: GPIO14
  sda: GPIO15
  frequency: 100kHz # Initialization stability
  scan: false

# Speaker Codec
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: i2c_bus
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24db

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: i2c_bus
    address: 0x40
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24db

esp_afe:
  id: afe_processor
  type: sr
  mode: low_cost
  mic_num: 2
  aec_enabled: true
  aec_filter_length: 4
  ns_enabled: true
  vad_enabled: false
  agc_enabled: true
  se_enabled: false              # Beamforming (dual mic)
  task_core: 1
  task_priority: 8

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO9
  i2s_mclk_pin: GPIO42
  i2s_din_pin: GPIO10
  i2s_dout_pin: GPIO8
  sample_rate: 16000
  processor_id: afe_processor
  buffers_in_psram: true # Required for sr_low_cost memory usage
  use_tdm_reference: true
  tdm_total_slots: 4
  tdm_mic_slots: [0, 2]        # Slot 0 = mic1, slot 2 = mic2
  tdm_ref_slot: 1              # Slot 1 = DAC feedback reference

# Post AEC processing
microphone:
  - platform: i2s_audio_duplex
    id: microphone_aec
    i2s_audio_duplex_id: i2s_duplex

speaker:
  - platform: i2s_audio_duplex
    id: external_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 16000

  - platform: mixer
    id: audio_mixer
    output_speaker: external_speaker
    num_channels: 1
    # task_stack_in_psram: true
    source_speakers:
      - id: media_speaker
        timeout: 10s
        buffer_duration: 100ms
      - id: va_speaker
        timeout: 10s
        buffer_duration: 100ms

switch:
  - platform: gpio
    id: internal_speaker_amp
    pin: GPIO46
    restore_mode: ALWAYS_ON
    internal: true

  - platform: esp_afe
    esp_afe_id: afe_processor
    aec:
      name: "Echo Cancellation"
      restore_mode: RESTORE_DEFAULT_ON
    se:
      name: "Beamforming"
      restore_mode: RESTORE_DEFAULT_ON
    ns:
      name: "Noise Suppression"
      restore_mode: RESTORE_DEFAULT_ON
    vad:
      name: "Voice Detection"
      restore_mode: RESTORE_DEFAULT_OFF
    agc:
      name: "Auto Gain Control"
      restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: microphone_mute
    name: "Microphone Mute"
    icon: "mdi:microphone-off"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(microphone_aec).get_mute_state();
    turn_on_action:
      - microphone.mute: microphone_aec
      - script.execute: update_leds
    turn_off_action:
      - microphone.unmute: microphone_aec
      - script.execute: update_leds

number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      name: "Software Mic Gain"
    speaker_volume:
      name: "Speaker Volume"
    mic_gain_pre_aec:
      name: "Mic Gain Pre AEC"

select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    entity_category: config
    options:
      - "sr_low_cost"
      - "sr_high_perf"
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "sr_low_cost"
    optimistic: true
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  - voice_assistant.is_running:
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - i2s_audio_duplex.stop: i2s_duplex
                  - esp_afe.set_mode:
                      id: afe_processor
                      mode: !lambda 'return x;'
                  - i2s_audio_duplex.start: i2s_duplex
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: microphone_mute
                      then:
                        - micro_wake_word.start: