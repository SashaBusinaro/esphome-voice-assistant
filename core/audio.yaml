external_components:
  - source: github://n-IA-hane/esphome-intercom
    components: [i2s_audio_duplex, esp_aec]
    refresh: 24h

i2c:
  id: i2c_bus
  scl: GPIO14
  sda: GPIO15
  frequency: 100kHz # Initialization stability
  scan: false

# Speaker Codec
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: i2c_bus
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24db

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: i2c_bus
    address: 0x40
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24db

esp_aec:
  id: aec_processor
  sample_rate: 16000   # AEC always operates on the 16kHz decimated stream
  filter_length: 4     # 64ms tail (4 for integrated codec, 8 for separate mic+speaker)
  mode: sr_low_cost    # Linear-only AEC, preserves spectral features for Wake Word

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO9
  i2s_mclk_pin: GPIO42
  i2s_din_pin: GPIO10
  i2s_dout_pin: GPIO8
  sample_rate: 16000
  aec_id: aec_processor
  buffers_in_psram: true # Required for sr_low_cost memory usage
  use_tdm_reference: true
  tdm_total_slots: 4
  tdm_mic_slot: 0
  tdm_ref_slot: 1

# Post AEC processing
microphone:
  - platform: i2s_audio_duplex
    id: microphone_aec
    i2s_audio_duplex_id: i2s_duplex

speaker:
  - platform: i2s_audio_duplex
    id: external_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 16000

  - platform: mixer
    id: audio_mixer
    output_speaker: external_speaker
    # # num_channels: 1
    # queue_mode: true
    # task_stack_in_psram: true
    source_speakers:
      - id: media_speaker
        timeout: 10s
        buffer_duration: 100ms
      - id: va_speaker
        timeout: 10s
        buffer_duration: 100ms

switch:
  - platform: gpio
    id: internal_speaker_amp
    pin: GPIO46
    restore_mode: ALWAYS_ON
    internal: true

  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: microphone_mute
    name: "Microphone Mute"
    icon: "mdi:microphone-off"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(microphone_aec).get_mute_state();
    turn_on_action:
      - microphone.mute: microphone_aec
      - script.execute: update_leds
      - script.execute: update_ui
    turn_off_action:
      - microphone.unmute: microphone_aec
      - script.execute: update_leds
      - script.execute: update_ui

number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      name: "Software Mic Gain"
    speaker_volume:
      name: "Speaker Volume"
    mic_gain_pre_aec:
      name: "Mic Gain Pre AEC"