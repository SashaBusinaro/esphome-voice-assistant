external_components:
  - source: github://n-IA-hane/esphome-intercom
    components: [i2s_audio_duplex, esp_aec]
    refresh: 24h

i2c:
  id: i2c_bus
  scl: GPIO14
  sda: GPIO15
  frequency: 100kHz # Initialization stability

# Speaker Codec
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: i2c_bus
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    # mic_gain: 24db

esp_aec:
  id: aec_component
  sample_rate: 16000
  filter_length: 4     # 64ms tail (4 for integrated codec, 8 for separate mic+speaker)
  mode: sr_low_cost    # Linear-only AEC, preserves spectral features for Wake Word

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO9
  i2s_mclk_pin: GPIO42
  i2s_din_pin: GPIO10
  i2s_dout_pin: GPIO8
  sample_rate: 16000
  aec_id: aec_component
  buffers_in_psram: true # Required for sr_low_cost memory usage
  use_tdm_reference: true
  tdm_total_slots: 4
  tdm_mic_slot: 0
  tdm_ref_slot: 1

# Post AEC processing
microphone:
  - platform: i2s_audio_duplex
    id: microphone_aec
    i2s_audio_duplex_id: i2s_duplex

speaker:
  - platform: i2s_audio_duplex
    id: external_speaker
    i2s_audio_duplex_id: i2s_duplex

switch:
  - platform: gpio
    id: internal_speaker_amp
    pin: GPIO46
    restore_mode: ALWAYS_ON
    internal: true