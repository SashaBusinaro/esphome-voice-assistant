external_components:
  - source: 
      type: git
      url: https://github.com/shelson/esphome-cst9217

spi:
  - id: display_qspi
    type: quad
    clk_pin: GPIO38
    data_pins:
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7

display:
  - platform: mipi_spi
    id: disp1
    model: CO5300
    bus_mode: quad
    reset_pin: GPIO39
    cs_pin: GPIO12
    dimensions:
      height: 466
      width: 466

light:
  - platform: monochromatic
    id: display_backlight
    name: "Backlight"
    output: backlight_brightness
    default_transition_length:
      milliseconds: 0
    initial_state:
      brightness: 0%
    restore_mode:
      ALWAYS_ON

output:
  - platform: template
    id: backlight_brightness
    type: float
    write_action:
      then:
        - lambda: |-
            id(disp1).set_brightness(state*255);

globals:
  - id: touch_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: touch_started
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_start_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_touch_action
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_long_press_fired
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 100ms
    then:
      - lambda: |-
          if (!id(touch_started) || id(g_long_press_fired)) return;
          int sx = id(touch_start_x);
          int sy = id(touch_start_y);
          // Only fire in center zone (not on volume buttons)
          if ((sx < 100 && sy >= 180 && sy <= 286) ||
              (sx > 366 && sy >= 180 && sy <= 286)) return;
          if (millis() - id(touch_start_ms) >= 500) {
            id(g_long_press_fired) = true;
            id(g_touch_action) = 3;
          }
      - if:
          condition:
            lambda: return id(g_touch_action) == 3;
          then:
            - switch.toggle: microphone_mute
            - lambda: id(g_touch_action) = 0;

# Touchscreen Configuration
touchscreen:
  - platform: cst9217
    display: disp1
    id: ts_disp1
    interrupt_pin: GPIO11
    reset_pin: GPIO40
    transform:
      mirror_x: true
      mirror_y: true
    on_touch:
      - lambda: |-
          id(touch_start_ms) = millis();
          id(touch_started) = true;
          id(touch_start_x) = touch.x;
          id(touch_start_y) = touch.y;
          id(g_long_press_fired) = false;
          ESP_LOGI("touch", "Touch start x=%d y=%d", touch.x, touch.y);
    on_release:
      - lambda: |-
          if (!id(touch_started)) {
            id(g_touch_action) = 0;
            return;
          }
          id(touch_started) = false;
          int sx = id(touch_start_x);
          int sy = id(touch_start_y);
          ESP_LOGI("touch", "Release x=%d y=%d long_press=%d", sx, sy, (int)id(g_long_press_fired));
          // Left [-] zone: volume down
          if (sx < 100 && sy >= 180 && sy <= 286) {
            float new_vol = std::max(0.0f, id(speaker_media_player).volume - 0.1f);
            id(g_volume_leds) = (int)roundf(new_vol * 24.0f);
            auto call = id(speaker_media_player).make_call();
            call.set_volume(new_vol);
            call.perform();
            id(g_touch_action) = 1;
          // Right [+] zone: volume up
          } else if (sx > 366 && sy >= 180 && sy <= 286) {
            float new_vol = std::min(1.0f, id(speaker_media_player).volume + 0.1f);
            id(g_volume_leds) = (int)roundf(new_vol * 24.0f);
            auto call = id(speaker_media_player).make_call();
            call.set_volume(new_vol);
            call.perform();
            id(g_touch_action) = 2;
          // Center: short tap → VA start (skip if long press fired mute, or mic is muted)
          } else if (!id(g_long_press_fired) && !id(microphone_aec).get_mute_state()) {
            id(g_touch_action) = 4;
          } else {
            id(g_touch_action) = 0;
          }
      - if:
          condition:
            lambda: return id(g_touch_action) == 1 || id(g_touch_action) == 2;
          then:
            - script.execute: show_volume_bar
      - if:
          condition:
            lambda: return id(g_touch_action) == 4;
          then:
            - voice_assistant.start:
