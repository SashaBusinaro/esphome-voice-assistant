spi:
  - id: display_qspi
    type: quad
    clk_pin: GPIO38
    data_pins:
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7

display:
  - platform: mipi_spi
    id: disp1
    model: CO5300
    bus_mode: quad
    brightness: 192
    reset_pin: GPIO39
    cs_pin: GPIO12
    update_interval: never
    dimensions:
      height: 466
      width: 466
      offset_width: 6  # UE015WV-RB24-A021A has 6-pixel horizontal offset
    color_depth: 16
    buffer_size: 100%  # Full buffer for smooth rendering

    # Display initialization sequence
    init_sequence:
      - [ 0xD0, 0x07, 0x42, 0x18]  # Gamma correction positive
      - delay 10ms
      - [ 0xD1, 0x00, 0x07, 0x10]  # Gamma correction negative
      - delay 10ms

light:
  - platform: monochromatic
    id: display_backlight
    name: "Backlight"
    output: backlight_brightness
    default_transition_length:
      milliseconds: 0
    initial_state:
      brightness: 0%
    restore_mode:
      ALWAYS_ON

output:
  - platform: template
    id: backlight_brightness
    type: float
    write_action:
      then:
        - lambda: |-
            id(disp1).set_brightness(state*255);
