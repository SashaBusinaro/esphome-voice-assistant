globals:
  - id: g_applied_ui
    type: int
    restore_value: no
    initial_value: '-1'

lvgl:
  displays:
    - disp1
  color_depth: 16
  buffer_size: 25%
  log_level: WARN

  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:
        # Main status arc — animated via lambda
        - arc:
            id: ring_arc
            align: CENTER
            width: 440
            height: 440
            start_angle: 0
            end_angle: 360
            rotation: 270
            min_value: 0
            max_value: 360
            value: 90
            adjustable: false
            arc_color: 0x08080e
            arc_width: 6
            arc_rounded: true
            indicator:
              arc_color: 0x303030
              arc_width: 6
              arc_rounded: true

        # Center status dot
        - obj:
            id: center_dot
            align: CENTER
            width: 12
            height: 12
            radius: 32767
            bg_color: 0x181820
            bg_opa: 47%
            border_width: 0
            pad_all: 0

        # Volume minus (left) — subtle indicator
        - line:
            id: vol_minus_line
            align: LEFT_MID
            x: 40
            points:
              - 0, 2
              - 24, 2
            line_width: 3
            line_color: 0x444450
            line_rounded: true
        # Volume plus (right) — subtle indicator
        - obj:
            id: vol_plus_container
            align: RIGHT_MID
            x: -18
            width: 44
            height: 44
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              - line:
                  id: vol_plus_h
                  points:
                    - 10, 22
                    - 34, 22
                  line_width: 3
                  line_color: 0x444450
                  line_rounded: true
              - line:
                  id: vol_plus_v
                  points:
                    - 22, 10
                    - 22, 34
                  line_width: 3
                  line_color: 0x444450
                  line_rounded: true

script:
  - id: update_ui
    then:
      - lambda: |-
          // Mirror update_leds priority: init > muted > vol=0 > VA phase
          int current_phase = id(voice_assistant_phase);
          bool is_init = id(init_in_progress);
          bool is_muted = id(microphone_aec).get_mute_state();
          bool is_vol_zero = id(speaker_media_player).volume <= 0.01f || id(speaker_media_player).is_muted();

          int target_state = 0;
          if (is_init) {
            target_state = 100;
          } else if (is_muted) {
            target_state = 200;
          } else if (is_vol_zero) {
            target_state = 300;
          } else {
            target_state = current_phase;
          }

          if (target_state == id(g_applied_ui)) return;
          id(g_applied_ui) = target_state;

          lv_obj_t *arc = id(ring_arc);
          lv_obj_t *dot = id(center_dot);

          // Stop all running animations on the arc
          lv_anim_del(arc, nullptr);
          // Reset opacity so previous pulse doesn't bleed into new state
          lv_obj_set_style_arc_opa(arc, 255, LV_PART_INDICATOR);

          // Idle: completely dark — hide arc and dot
          if (target_state == 1) {
            lv_obj_add_flag(arc, LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(dot, LV_OBJ_FLAG_HIDDEN);
            return;
          }

          lv_obj_clear_flag(arc, LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(dot, LV_OBJ_FLAG_HIDDEN);

          lv_color_t color;
          uint16_t arc_end = 360;
          bool do_spin = false;
          uint32_t spin_ms = 0;
          bool do_pulse = false;
          uint32_t pulse_ms = 0;

          switch (target_state) {
            case 100: // Init: blue arc, spinning
              color = lv_color_hex(0x0066FF);
              arc_end = 60;
              do_spin = true; spin_ms = 2500;
              break;
            case 10:  // Not ready: dark red, full ring, static
              color = lv_color_hex(0x880000);
              arc_end = 360;
              break;
            case 2:   // Listening: bright blue, full ring, pulsing
            case 3:
              color = lv_color_hex(0x0088FF);
              arc_end = 360;
              do_pulse = true; pulse_ms = 1200;
              break;
            case 4:   // Thinking: blue, full ring, fast spin
              color = lv_color_hex(0x0066FF);
              arc_end = 360;
              do_spin = true; spin_ms = 1000;
              break;
            case 5:   // Replying: white, full ring, gentle pulse
              color = lv_color_hex(0xEEEEFF);
              arc_end = 360;
              do_pulse = true; pulse_ms = 800;
              break;
            case 11:  // Error: red, full ring, fast flash
              color = lv_color_hex(0xFF0000);
              arc_end = 360;
              do_pulse = true; pulse_ms = 300;
              break;
            case 200: // Muted: orange, full ring, static
              color = lv_color_hex(0xFF4400);
              arc_end = 360;
              break;
            case 300: // Vol=0: yellow, full ring, static
              color = lv_color_hex(0xFFCC00);
              arc_end = 360;
              break;
            default:
              color = lv_color_hex(0x0a0a14);
              arc_end = 90;
              break;
          }

          // Apply indicator color, arc span, and dot color
          lv_obj_set_style_arc_color(arc, color, LV_PART_INDICATOR);
          lv_arc_set_angles(arc, 0, arc_end);
          lv_obj_set_style_bg_color(dot, color, LV_PART_MAIN);

          if (do_spin) {
            lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_var(&a, arc);
            lv_anim_set_exec_cb(&a, [](void *obj, int32_t v) {
              lv_arc_set_rotation((lv_obj_t *)obj, (uint16_t)v);
            });
            lv_anim_set_values(&a, 0, 360);
            lv_anim_set_time(&a, spin_ms);
            lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
            lv_anim_start(&a);
          } else {
            lv_arc_set_rotation(arc, 270); // start from 12 o'clock
          }

          if (do_pulse) {
            lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_var(&a, arc);
            lv_anim_set_exec_cb(&a, [](void *obj, int32_t v) {
              lv_obj_set_style_arc_opa((lv_obj_t *)obj, (lv_opa_t)v, LV_PART_INDICATOR);
            });
            lv_anim_set_values(&a, 60, 255);
            lv_anim_set_time(&a, pulse_ms);
            lv_anim_set_playback_time(&a, pulse_ms);
            lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
            lv_anim_start(&a);
          }
