substitutions:
  name: "waveshare"
  friendly_name: "Waveshare"
  # Phases of the Voice Assistant
  # The voice assistant is ready to be triggered by a wake word
  voice_assist_idle_phase_id: '1'
  # The voice assistant is waiting for a voice command (after being triggered by the wake word)
  voice_assist_waiting_for_command_phase_id: '2'
  # The voice assistant is listening for a voice command
  voice_assist_listening_for_command_phase_id: '3'
  # The voice assistant is currently processing the command
  voice_assist_thinking_phase_id: '4'
  # The voice assistant is replying to the command
  voice_assist_replying_phase_id: '5'
  # The voice assistant is not ready
  voice_assist_not_ready_phase_id: '10'
  # The voice assistant encountered an error
  voice_assist_error_phase_id: '11'
  
  # LED Brightness
  led_brightness_low: "0.4f"
  led_brightness_high: "0.6f"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  on_boot:
    - priority: 200
      then:
        - lambda: |-
            // 1. Enable ALL ADC clocks (ESPHome driver only enables ADC1+2)
            uint8_t reg01;
            if (!id(es7210_adc).read_byte(0x01, &reg01)) {
              ESP_LOGE("es7210_tdm", "Failed to read reg 0x01, TDM config aborted");
              return;
            }
            reg01 &= ~0x3F;  // Clear bits 0-5: enable ADC1-4 clocks + CP + BCLK
            
            if (!id(es7210_adc).write_byte(0x01, reg01) ||
                !id(es7210_adc).write_byte(0x12, 0x02)) {  // Enable TDM I2S mode
              ESP_LOGE("es7210_tdm", "Failed to write clock/TDM registers");
              return;
            }

            // 2. Set gains
            if (!id(es7210_adc).write_byte(0x43, 0x18) ||  // MIC1: 24dB
                !id(es7210_adc).write_byte(0x44, 0x1A) ||  // MIC2 (AEC Reference): 30dB
                !id(es7210_adc).write_byte(0x45, 0x18)) {  // MIC3: 24dB
              ESP_LOGE("es7210_tdm", "Failed to write MIC gain registers");
              return;
            }

            ESP_LOGI("es7210_tdm", "TDM config applied successfully!");
        - script.execute: update_leds

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"     # Move code to PSRAM, frees internal SRAM
      CONFIG_SPIRAM_RODATA: "y"                 # Move read-only data to PSRAM
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"    # TLS buffers in PSRAM (saves ~40KB internal)

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false # Higher performance optimization settings for networking

network:
  enable_high_performance: true

# Enable logging
logger:
  level: DEBUG
  logs:
    sensor: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

packages:
  wifi: !include core/wifi.yaml
  audio: !include core/audio.yaml
  va: !include core/va.yaml
  led: !include core/led.yaml

globals:
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'

button:
  - platform: restart
    name: "Reboot"

number: 
  - platform: template
    id: mic_gain_db
    name: "Mic Gain (ES7210 dB)"
    entity_category: config
    min_value: 0
    max_value: 36
    step: 3
    restore_value: true
    initial_value: 32
    set_action:
      - lambda: |-
          id(es7210_adc).set_mic_gain(x);   // adjust PGA on the fly
      - logger.log:
          format: "[MIC] Set ES7210 gain to %.0f dB"
          args: ["x"]

  - platform: template
    id: va_mic_gain_factor
    name: "VA MIC Gain Factor"
    entity_category: config
    min_value: 1
    max_value: 64
    step: 1
    restore_value: true
    initial_value: 64
    set_action:
      - lambda: |-
          id(va_mic).set_gain_factor(x);
      - logger.log:
          format: "[VA MIC] Set gain factor to %.0f"
          args: ["x"]

  - platform: template
    id: mww_mic_gain_factor
    name: "MWW MIC Gain Factor"
    entity_category: config
    min_value: 1
    max_value: 64
    step: 1
    restore_value: true
    initial_value: 64
    set_action:
      - lambda: |-
          id(mww_mic).set_gain_factor(x);
      - logger.log:
          format: "[MWW MIC] Set gain factor to %.0f"
          args: ["x"]

  - platform: template
    id: noise_suppression
    name: "VA Noise Suppression"
    entity_category: config
    min_value: 0
    max_value: 4
    step: 1
    restore_value: true
    initial_value: 0
    set_action:
      - lambda: |-
          id(va).set_noise_suppression_level(x);
      - logger.log:
          format: "[VA] Set suppression to %.0f"
          args: ["x"]
