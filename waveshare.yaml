substitutions:
  name: "waveshare"
  friendly_name: "Waveshare"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  on_boot:
    - priority: 200
      then:
        - lambda: |-
            // 1. Enable ALL ADC clocks (ESPHome driver only enables ADC1+2)
            uint8_t reg01;
            if (!id(es7210_adc).read_byte(0x01, &reg01)) {
              ESP_LOGE("es7210_tdm", "Failed to read reg 0x01, TDM config aborted");
              return;
            }
            reg01 &= ~0x3F;  // Clear bits 0-5: enable ADC1-4 clocks + CP + BCLK
            
            if (!id(es7210_adc).write_byte(0x01, reg01) ||
                !id(es7210_adc).write_byte(0x12, 0x02)) {  // Enable TDM I2S mode
              ESP_LOGE("es7210_tdm", "Failed to write clock/TDM registers");
              return;
            }

            // 2. Set gains
            if (!id(es7210_adc).write_byte(0x43, 0x1A) ||  // MIC1: 30dB
                !id(es7210_adc).write_byte(0x44, 0x1A) ||  // MIC2 (AEC Reference): 30dB
                !id(es7210_adc).write_byte(0x45, 0x1A)) {  // MIC3: 30dB
              ESP_LOGE("es7210_tdm", "Failed to write MIC gain registers");
              return;
            }

            ESP_LOGI("es7210_tdm", "TDM config applied successfully!");
    # - priority: 375
    #   then:
    #     - switch.turn_on: internal_speaker_amp
    - priority: -100
      then:
        - delay: 5sec
        - sound_level.start:

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"     # Move code to PSRAM, frees internal SRAM
      CONFIG_SPIRAM_RODATA: "y"                 # Move read-only data to PSRAM
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"    # TLS buffers in PSRAM (saves ~40KB internal)

      CONFIG_LWIP_MAX_SOCKETS: "16"

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:
  level: DEBUG
  logs:
    sensor: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

packages:
  audio: !include core/audio.yaml

number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      name: "Software Mic Gain"
    speaker_volume:
      name: "Speaker Volume"

media_player:
  - platform: speaker
    id: external_media_player
    name: "Media Player"
    task_stack_in_psram: true
    media_pipeline:
      speaker: media_speaker
      sample_rate: 48000
      format: FLAC
    announcement_pipeline:
      speaker: va_speaker
      sample_rate: 48000
      format: FLAC

sensor:
  - platform: sound_level
    microphone: 
      microphone: microphone_aec
      # channels: 0
    passive: false
    peak:
      name: "Peak Loudness"

intercom_api:
  id: intercom
  mode: simple
  microphone: microphone_aec
  speaker: va_speaker
  aec_id: aec_processor