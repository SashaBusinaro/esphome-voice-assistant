substitutions:
  name: "waveshare"
  friendly_name: "Waveshare"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  on_boot:
    - priority: 200
      then:
        - lambda: |-
            // Enable ES7210 TDM mode + MIC3 for AEC reference via I2C
            uint8_t data[2];
            
            // Clock enable: clear bits [5:0] to enable all clocks
            data[0] = 0x01; data[1] = 0x00;
            id(i2c_bus).write(0x40, data, 2);
            
            // TDM mode enable (Required for ES7210 to interleave Mic and DAC feedback)
            data[0] = 0x12; data[1] = 0x02;
            id(i2c_bus).write(0x40, data, 2);

            // MIC1 gain 30dB (Physical Mic 1)
            data[0] = 0x43; data[1] = 0x1A;
            id(i2c_bus).write(0x40, data, 2);

            // MIC2 gain 30dB (Captures the DAC analog output as AEC reference)
            data[0] = 0x44; data[1] = 0x1A;
            id(i2c_bus).write(0x40, data, 2);
            
            // MIC3 gain 30dB (Physical Mic 2)
            data[0] = 0x45; data[1] = 0x1A;
            id(i2c_bus).write(0x40, data, 2);
    - priority: 375
      then:
        - switch.turn_on: internal_speaker_amp
    - priority: -100
      then:
        - delay: 10sec
        - sound_level.start:

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"     # Move code to PSRAM, frees internal SRAM
      CONFIG_SPIRAM_RODATA: "y"                 # Move read-only data to PSRAM
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"    # TLS buffers in PSRAM (saves ~40KB internal)

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:
  level: DEBUG
  logs:
    sensor: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

packages:
  audio: !include core/audio.yaml

number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      name: "Software Mic Gain"
    speaker_volume:
      name: "Speaker Volume"

media_player:
  - platform: speaker
    id: external_media_player
    name: "Media Player"
    announcement_pipeline:
      speaker: external_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1

sensor:
  - platform: sound_level
    microphone: 
      microphone: microphone_aec
      # channels: 0
    passive: false
    peak:
      name: "Peak Loudness"